name: 🚀 Finalize Release

# ──────────────────────────────────────────────────────────────────────────────
# Disparo automático quando um Pull Request para a branch `main` é fechado e mergeado.
# Verifica se a origem era uma branch `release/vX.X.X` e, em caso positivo,
# cria a tag e o GitHub Release.
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  finalize-release:
    name: "Create Tag and Release"
    # Somente executa se o PR foi aceito (mergeado) e a origem era uma branch de release
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessário para criar a tag e o release

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extrair versão
        id: extract_version
        run: |
          # O head_ref é algo como 'release/v1.0.0'
          BRANCH_NAME="${{ github.head_ref }}"
          # Corta o 'release/' para pegar apenas a tag (ex: 'v1.0.0')
          TAG_NAME="${BRANCH_NAME#release/}"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "🏷️  Tag identificada: ${TAG_NAME}"

      - name: Configurar Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Criar Tag
        run: |
          TAG="${{ steps.extract_version.outputs.tag_name }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "✅ Tag '$TAG' criada e enviada com sucesso."

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_version.outputs.tag_name }}
          name: Release ${{ steps.extract_version.outputs.tag_name }}
          generate_release_notes: true
